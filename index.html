<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi任務發起區</title>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #f4f7f6; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 120px; }
    label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 3px; }
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { min-height: 80px; }
    button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .loader { display: none; color: #3498db; text-align: center; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <h2>Pi任務發起區</h2>
  <form id="taskForm">
    <div class="row">
      <div class="col"><label>發起人</label><select id="initiator"><option>Harry</option><option>Zoe</option><option>Ian</option><option>Chris</option></select></div>
      <div class="col"><label>PIC</label><select id="pic"><option>Harry</option><option>Zoe</option><option>Ian</option><option>Chris</option></select></div>
      <div class="col"><label>Aspect</label><select id="aspect"><option>Project Management</option><option>Accounting</option><option>Admin</option><option>Human Resources</option><option>Research & Development</option><option>Sales & Marketing</option></select></div>
    </div>
    <div class="row"><div class="col"><label>Project</label><input type="text" id="project" value="NO"></div></div>
    <div class="row"><div class="col"><label>Task *</label><input type="text" id="task" required></div></div>
    <div class="row">
      <div class="col"><label>Important</label><select id="important"><option>NO</option><option>YES</option></select></div>
      <div class="col"><label>Urgent</label><select id="urgent"><option>NO</option><option>YES</option></select></div>
    </div>
    <div class="row"><div class="col"><label>Background</label><textarea id="background">-</textarea></div></div>
    <div class="row"><div class="col"><label>Description</label><textarea id="description">-</textarea></div></div>
    <div class="row"><div class="col"><label>Key output</label><textarea id="keyOutput">-</textarea></div></div>
    <div class="row"><div class="col"><label>上傳相片 (多選)</label><input type="file" id="fileUpload" multiple></div></div>
    <div style="margin: 10px 0;"><input type="checkbox" id="exportDoc"> <label for="exportDoc">同時匯出獨立任務文件</label></div>
    <button type="submit" id="submitBtn">傳送任務</button>
    <div id="loader" class="loader">正在處理中...</div>
  </form>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyPZg2063z-x_UCCQMHRGC6rv52tee1D0TM-2orLnx_026r625hpqImoP18PKircWSWNg/exec";

  document.getElementById("taskForm").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const loader = document.getElementById("loader");
    btn.disabled = true; loader.style.display = "block";

    const payload = {
      action: "githubFormSubmit",
      initiator: document.getElementById("initiator").value,
      pic: document.getElementById("pic").value,
      aspect: document.getElementById("aspect").value,
      project: document.getElementById("project").value,
      task: document.getElementById("task").value,
      important: document.getElementById("important").value,
      urgent: document.getElementById("urgent").value,
      background: document.getElementById("background").value,
      description: document.getElementById("description").value,
      keyOutput: document.getElementById("keyOutput").value,
      exportDoc: document.getElementById("exportDoc").checked,
      files: []
    };

    const files = document.getElementById("fileUpload").files;
    for (let f of files) {
      const base64 = await new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result.split(',')[1]);
        reader.readAsDataURL(f);
      });
      payload.files.push({ base64, name: f.name, type: f.type });
    }

    fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(res => {
        if(res.status === "success") { alert("✅ 發送成功！"); document.getElementById("taskForm").reset(); document.getElementById("project").value = "NO"; }
        else alert("❌ 錯誤：" + res.message);
      })
      .catch(err => alert("❌ 系統失敗：" + err))
      .finally(() => { btn.disabled = false; loader.style.display = "none"; });
  };
</script>
</body>
</html>
